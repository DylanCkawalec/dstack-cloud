workers = 8
max_blocking = 64
ident = "dstack Gateway"
temp_dir = "/tmp"
keep_alive = 10
log_level = "info"
address = "127.0.0.1:8010"

[core]
kms_url = ""
# auto set soft ulimit to hard ulimit
set_ulimit = true
rpc_domain = ""

[core.auth]
enabled = false
url = "http://localhost/app-auth"
timeout = "5s"

[core.admin]
enabled = false
address = "127.0.0.1:8011"

[core.debug]
insecure_enable_debug_rpc = false
insecure_skip_attestation = false
key_file = "debug_key.json"
address = "127.0.0.1:8012"

[core.wg]
public_key = ""
private_key = ""
listen_port = 51820
ip = "10.0.0.1/24"
reserved_net = ["10.0.0.1/32"]
client_ip_range = "10.0.0.0/25"
config_path = "/etc/wireguard/wg0.conf"
interface = "wg0"
endpoint = "10.0.2.2:51820"

[core.proxy]
tls_crypto_provider = "aws-lc-rs"
tls_versions = ["1.2"]
listen_addr = "0.0.0.0"
listen_port = 8443
agent_port = 8090
buffer_size = 8192
# number of hosts to try to connect to
connect_top_n = 3
localhost_enabled = false
app_address_ns_prefix = "_dstack-app-address"
app_address_ns_compat = true
workers = 32
external_port = 443
# Maximum concurrent connections per app. 0 means unlimited.
max_connections_per_app = 2000

[core.proxy.timeouts]
# Timeout for establishing a connection to the target app.
connect = "5s"
# TLS-termination handshake timeout or SNI extraction timeout.
handshake = "5s"

# Timeout for top n hosts selection
cache_top_n = "30s"
# Timeout for DNS TXT record resolution (app address lookup).
dns_resolve = "5s"

# Enable data transfer timeouts below. This might impact performance. Turn off if
# bad performance is observed.
data_timeout_enabled = true
# Timeout for a connection without any data transfer.
idle = "10m"
# Timeout for writing data to the target app or to the client.
write = "5s"
# Timeout for shutting down a connection.
shutdown = "5s"
# Timeout for total connection duration.
total = "5h"

[core.recycle]
enabled = true
interval = "5m"
timeout = "10h"
node_timeout = "10m"

[core.sync]
enabled = false
# WaveKV node ID for this gateway (must be unique across cluster)
node_id = 0
my_url = "https://localhost:8011"
interval = "1m"
timeout = "30s"
# The URL of the bootnode used to fetch initial peer list when joining the network.
# Leave empty if this is the first node or peers are managed via Admin.SetNodeInfo RPC.
bootnode = ""
# Data directory for WaveKV persistence (WAL and snapshots)
data_dir = "/dstack-gateway/data"
# Interval for periodic persistence of WaveKV data (e.g., "5s", "1m", "1h")
persist_interval = "5m"
# Enable periodic sync of instance connections to KV store
sync_connections_enabled = true
# Interval for syncing instance connections to KV store
sync_connections_interval = "30s"
